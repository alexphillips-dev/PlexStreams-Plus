name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      release_date:
        description: Override date in YYYY.MM.DD (default is America/New_York current date)
        required: false
        type: string
      revision:
        description: Override numeric revision (example: 1 becomes .1; default is auto increment)
        required: false
        type: string
      changelog:
        description: Changelog bullet inserted at the top of both manifests
        required: false
        default: Automated release pipeline update.
        type: string
      allow_date_override:
        description: Allow publishing with a non-today release_date
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Tooling doctor
        run: bash scripts/doctor.sh

      - name: Build release artifacts and update manifests
        id: release
        env:
          RELEASE_DATE: ${{ inputs.release_date }}
          RELEASE_REVISION: ${{ inputs.revision }}
          RELEASE_CHANGELOG: ${{ inputs.changelog }}
          ALLOW_RELEASE_DATE_OVERRIDE: ${{ inputs.allow_date_override && '1' || '0' }}
          TZ: America/New_York
        run: bash scripts/release.sh

      - name: Fixture tests
        run: bash scripts/fixture_tests.sh

      - name: Release guard checks
        run: bash scripts/release_guard.sh

      - name: Install smoke checks
        run: bash scripts/install_smoke.sh

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No release changes were generated."
            exit 0
          fi

          git add archive plexstreams.plg plexstreamsplus.plg plexstreams.xml plexstreamsplus.xml src/plexstreamsplus/usr/local/emhttp/plugins/plexstreamsplus/includes/common.php
          git commit -m "release: ${{ steps.release.outputs.version }}"
          git push
